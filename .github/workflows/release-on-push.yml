name: Build Release Assets

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore "ExcelSheetsUnlocker/ExcelSheetsUnlocker.csproj"

      - name: Publish smaller download
        run: >
          dotnet publish "ExcelSheetsUnlocker/ExcelSheetsUnlocker.csproj"
          -c Release
          -r win-x64
          --self-contained false
          /p:PublishSingleFile=true
          /p:PublishTrimmed=false
          -o "${{ github.workspace }}\publish-smaller-download"

      - name: Publish no-dotnet-needed download
        run: >
          dotnet publish "ExcelSheetsUnlocker/ExcelSheetsUnlocker.csproj"
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:PublishTrimmed=false
          -o "${{ github.workspace }}\publish-no-dotnet-needed"

      - name: Create ZIP files
        shell: pwsh
        run: |
          $smallerZipPath = "${{ github.workspace }}\ExcelSheetsUnlocker - Smaller Download.zip"
          $noDotnetZipPath = "${{ github.workspace }}\ExcelSheetsUnlocker - No .NET Needed.zip"

          if (Test-Path $smallerZipPath) {
            Remove-Item $smallerZipPath -Force
          }

          if (Test-Path $noDotnetZipPath) {
            Remove-Item $noDotnetZipPath -Force
          }

          Compress-Archive `
            -Path "${{ github.workspace }}\publish-smaller-download\*" `
            -DestinationPath $smallerZipPath

          Compress-Archive `
            -Path "${{ github.workspace }}\publish-no-dotnet-needed\*" `
            -DestinationPath $noDotnetZipPath

      - name: Create or update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous Build
          prerelease: false
          make_latest: false
          files: |
            ${{ github.workspace }}\ExcelSheetsUnlocker - Smaller Download.zip
            ${{ github.workspace }}\ExcelSheetsUnlocker - No .NET Needed.zip
          body: |
            Automatic build from commit `${{ github.sha }}`.
          overwrite_files: true
